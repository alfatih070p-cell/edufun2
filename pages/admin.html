<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Panel — EduFun</title>
  <link rel="stylesheet" href="../assets/css/app.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b}
    .adm-wrap{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
    .adm-header{background:#1e293b;color:#fff;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
    .adm-logo{width:44px;height:44px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
    .adm-title{font-size:1.15rem;font-weight:800}
    .adm-sub{font-size:.75rem;color:#94a3b8;margin-top:.1rem}
    .adm-back{margin-left:auto;background:#334155;color:#fff;border:none;border-radius:10px;padding:.45rem .9rem;font-size:.8rem;font-weight:700;cursor:pointer}
    .adm-card{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;margin-bottom:1rem;overflow:hidden}
    .adm-card-hdr{padding:.85rem 1.1rem;border-bottom:1.5px solid #f1f5f9;display:flex;align-items:center;gap:.6rem}
    .adm-card-hdr-title{font-weight:800;font-size:.92rem}
    .adm-card-hdr-count{margin-left:auto;background:#f1f5f9;color:#64748b;font-size:.72rem;font-weight:700;padding:.2rem .55rem;border-radius:99px}
    .adm-search{padding:.75rem 1rem;border-bottom:1.5px solid #f8fafc}
    .adm-search input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:.5rem .85rem;font-size:.85rem;font-family:inherit;outline:none}
    .adm-search input:focus{border-color:#3b82f6}
    .user-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.1rem;border-bottom:1px solid #f8fafc;transition:background .15s}
    .user-row:last-child{border-bottom:none}
    .user-row:hover{background:#f8fafc}
    .user-av{width:36px;height:36px;border-radius:50%;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:#4f46e5;flex-shrink:0}
    .user-name{font-weight:700;font-size:.87rem}
    .user-meta{font-size:.71rem;color:#94a3b8;margin-top:.1rem}
    .role-badge{display:inline-block;font-size:.65rem;font-weight:800;padding:.15rem .45rem;border-radius:99px;margin-left:.35rem}
    .rb-admin{background:#fef2f2;color:#dc2626}
    .rb-guru{background:#f0fdf4;color:#16a34a}
    .rb-siswa{background:#eff6ff;color:#2563eb}
    .user-xp{font-size:.75rem;font-weight:700;color:#64748b;min-width:55px;text-align:right}
    .btn-del{background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca;border-radius:8px;padding:.35rem .7rem;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-del:hover{background:#ef4444;color:#fff}
    .btn-role{background:#f0f9ff;color:#0369a1;border:1.5px solid #bae6fd;border-radius:8px;padding:.35rem .7rem;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-role:hover{background:#0ea5e9;color:#fff}
    .adm-empty{text-align:center;padding:2.5rem 1rem;color:#94a3b8}
    .adm-loading{text-align:center;padding:2rem;color:#94a3b8;font-size:.85rem}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
    .stat-chip{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:.85rem 1rem;text-align:center}
    .stat-chip-num{font-size:1.5rem;font-weight:800;color:#1e293b}
    .stat-chip-lbl{font-size:.7rem;color:#94a3b8;font-weight:600;margin-top:.2rem}
    .adm-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f1f5f9}
    .adm-gate-box{background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;padding:2rem 1.5rem;text-align:center;max-width:320px;width:90%}
    .toast-adm{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:.65rem 1.2rem;border-radius:12px;font-size:.82rem;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;display:none}
    .confirm-box{background:#fff;border-radius:16px;padding:1.5rem;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .confirm-box h3{font-size:1rem;font-weight:800;margin-bottom:.5rem}
    .confirm-box p{font-size:.83rem;color:#64748b;margin-bottom:1.2rem;line-height:1.5}
    .confirm-actions{display:flex;gap:.6rem}
    .btn-cancel{flex:1;background:#f1f5f9;color:#64748b;border:none;border-radius:10px;padding:.6rem;font-weight:700;font-size:.83rem;cursor:pointer}
    .btn-confirm-del{flex:1;background:#ef4444;color:#fff;border:none;border-radius:10px;padding:.6rem;font-weight:700;font-size:.83rem;cursor:pointer}
  </style>
</head>
<body>

<!-- Gate: tampil dulu loading, nanti JS yang hide/show -->
<div id="adm-gate" class="adm-gate">
  <div class="adm-gate-box">
    <div style="font-size:2rem;margin-bottom:.75rem">🔐</div>
    <div style="font-weight:800;font-size:1rem;margin-bottom:.4rem">Admin Panel</div>
    <div style="font-size:.8rem;color:#94a3b8" id="gate-msg">Memeriksa akses...</div>
  </div>
</div>

<!-- Panel utama (hidden by default) -->
<div id="adm-main" style="display:none">
<div class="adm-wrap">

  <div class="adm-header">
    <div class="adm-logo">🛡️</div>
    <div>
      <div class="adm-title">Admin Panel</div>
      <div class="adm-sub" id="adm-logged-as">Loading...</div>
    </div>
    <button class="adm-back" onclick="window.location.href='app.html'">← Kembali ke App</button>
  </div>

  <!-- Stats chips -->
  <div class="stats-grid">
    <div class="stat-chip">
      <div class="stat-chip-num" id="stat-total">—</div>
      <div class="stat-chip-lbl">Total User</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-num" id="stat-siswa">—</div>
      <div class="stat-chip-lbl">Siswa</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-num" id="stat-guru">—</div>
      <div class="stat-chip-lbl">Guru</div>
    </div>
  </div>

  <!-- User list card -->
  <div class="adm-card">
    <div class="adm-card-hdr">
      <span style="font-size:1.1rem">👥</span>
      <span class="adm-card-hdr-title">Kelola Pengguna</span>
      <span class="adm-card-hdr-count" id="user-count">0 user</span>
      <button onclick="loadUsers()" style="margin-left:.5rem;background:#f1f5f9;border:none;border-radius:8px;padding:.3rem .6rem;font-size:.75rem;cursor:pointer;font-weight:700">🔄 Refresh</button>
    </div>
    <div class="adm-search">
      <input type="text" id="search-input" placeholder="🔍 Cari username..." oninput="filterUsers(this.value)"/>
    </div>
    <div id="user-list">
      <div class="adm-loading">⏳ Memuat data pengguna...</div>
    </div>
  </div>

</div>
</div>

<!-- Confirm delete overlay -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>🗑️ Hapus Akun?</h3>
    <p id="confirm-msg">Akun <strong id="confirm-name"></strong> akan dihapus permanen dari Auth & Firestore. Tindakan ini tidak bisa dibatalkan.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Batal</button>
      <button class="btn-confirm-del" id="confirm-del-btn" onclick="executeDelete()">🗑️ Hapus</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-adm" id="adm-toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/js/firebase-config.js"></script>

<script>
// ── State ──
let allUsers = [];
let pendingDeleteUid = null;
let pendingDeleteUsername = null;
let pendingDeleteUidAuth = null;

// ── Toast ──
function toastAdm(msg, dur = 2800) {
  const el = document.getElementById('adm-toast');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', dur);
}

// ── Gate check: harus login & role === 'admin' ──
// Dual check: local session bypass (admin lokal) ATAU Firebase Auth
function _grantAdminAccess(username) {
  document.getElementById('adm-gate').style.display = 'none';
  document.getElementById('adm-main').style.display = '';
  document.getElementById('adm-logged-as').textContent = 'Login sebagai: ' + username;
  loadUsers();
}

function _denyAccess(msg, dest) {
  document.getElementById('gate-msg').textContent = msg;
  setTimeout(() => window.location.href = dest || 'auth.html', 1800);
}

// Step 1: cek local session dulu (admin bypass tidak pakai Firebase Auth)
(function checkLocalSession() {
  try {
    const raw = sessionStorage.getItem('edufun_session') || localStorage.getItem('edufun_session');
    if (raw) {
      const sess = JSON.parse(raw);
      if (sess && sess.role === 'admin' && sess.expiresAt > Date.now()) {
        // Valid local admin session — langsung grant akses
        _grantAdminAccess(sess.username || 'Admin');
        return;
      }
    }
  } catch(e) {}

  // Step 2: fallback ke Firebase Auth (untuk admin yang login via Firestore)
  firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) {
      _denyAccess('❌ Kamu belum login. Redirecting...', 'auth.html');
      return;
    }
    try {
      const doc = await firebase.firestore().collection('users').doc(user.uid).get();
      if (!doc.exists || doc.data().role !== 'admin') {
        _denyAccess('🚫 Akses ditolak. Bukan admin.', 'app.html');
        return;
      }
      _grantAdminAccess(doc.data().username || user.email);
    } catch(e) {
      document.getElementById('gate-msg').textContent = '❌ Error: ' + e.message;
    }
  });
})();

// ── Load semua user dari Firestore ──
async function loadUsers() {
  document.getElementById('user-list').innerHTML = '<div class="adm-loading">⏳ Memuat...</div>';
  try {
    const snap = await firebase.firestore().collection('users').orderBy('createdAt', 'desc').get();
    allUsers = [];
    snap.forEach(doc => {
      allUsers.push({ uid: doc.id, ...doc.data() });
    });
    updateStats();
    renderUsers(allUsers);
    document.getElementById('user-count').textContent = allUsers.length + ' user';
  } catch(e) {
    document.getElementById('user-list').innerHTML =
      '<div class="adm-empty">❌ Gagal load: ' + e.message + '</div>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allUsers.length;
  document.getElementById('stat-siswa').textContent = allUsers.filter(u => u.role === 'siswa' || !u.role).length;
  document.getElementById('stat-guru').textContent  = allUsers.filter(u => u.role === 'guru').length;
}

function roleBadge(role) {
  if (role === 'admin') return '<span class="role-badge rb-admin">ADMIN</span>';
  if (role === 'guru')  return '<span class="role-badge rb-guru">Guru</span>';
  return '<span class="role-badge rb-siswa">Siswa</span>';
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('user-list').innerHTML =
      '<div class="adm-empty">🔍 Tidak ada user ditemukan</div>';
    return;
  }
  const myUid = firebase.auth().currentUser?.uid;
  document.getElementById('user-list').innerHTML = users.map(u => {
    const isMe = u.uid === myUid;
    const initials = (u.username || '?').slice(0, 2).toUpperCase();
    const joined = u.createdAt ? new Date(u.createdAt).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) : '—';
    return `<div class="user-row" id="row-${u.uid}">
      <div class="user-av">${initials}</div>
      <div style="flex:1;min-width:0">
        <div class="user-name">${u.username || '(no username)'}${roleBadge(u.role)}${isMe ? ' <span style="font-size:.65rem;color:#94a3b8">(Kamu)</span>' : ''}</div>
        <div class="user-meta">Lv.${u.level||1} · ${u.xp||0} XP · Bergabung ${joined}</div>
      </div>
      <div style="display:flex;gap:.4rem;flex-shrink:0">
        ${u.role !== 'admin' ? `<button class="btn-role" onclick="changeRole('${u.uid}','${u.username}','${u.role}')" title="Ganti role">🔄 Role</button>` : ''}
        ${!isMe ? `<button class="btn-del" onclick="confirmDelete('${u.uid}','${u.username}')" title="Hapus akun">🗑️</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Filter / search ──
function filterUsers(q) {
  const filtered = q.trim()
    ? allUsers.filter(u => (u.username || '').toLowerCase().includes(q.toLowerCase()))
    : allUsers;
  renderUsers(filtered);
}

// ── Change role ──
async function changeRole(uid, username, currentRole) {
  const roles = ['siswa', 'guru', 'admin'];
  const nextRole = roles[(roles.indexOf(currentRole) + 1) % roles.length];
  if (!confirm(`Ganti role "${username}" dari "${currentRole}" → "${nextRole}"?`)) return;
  try {
    await firebase.firestore().collection('users').doc(uid).update({ role: nextRole });
    const idx = allUsers.findIndex(u => u.uid === uid);
    if (idx >= 0) allUsers[idx].role = nextRole;
    renderUsers(allUsers);
    updateStats();
    toastAdm('✅ Role ' + username + ' diubah ke ' + nextRole);
  } catch(e) {
    toastAdm('❌ Gagal ubah role: ' + e.message);
  }
}

// ── Delete flow ──
function confirmDelete(uid, username) {
  pendingDeleteUid = uid;
  pendingDeleteUsername = username;
  document.getElementById('confirm-name').textContent = username;
  document.getElementById('confirm-overlay').style.display = 'flex';
}

function closeConfirm() {
  pendingDeleteUid = null;
  pendingDeleteUsername = null;
  document.getElementById('confirm-overlay').style.display = 'none';
}

async function executeDelete() {
  if (!pendingDeleteUid) return;
  const uid = pendingDeleteUid;
  const username = pendingDeleteUsername;
  const btn = document.getElementById('confirm-del-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Menghapus...';

  try {
    const db = firebase.firestore();
    // 1. Hapus dokumen users/{uid}
    await db.collection('users').doc(uid).delete();
    // 2. Hapus dokumen userdata/{uid}
    try { await db.collection('userdata').doc(uid).delete(); } catch(e) {}
    // 3. Hapus username mapping
    try { await db.collection('usernames').doc(username.toLowerCase()).delete(); } catch(e) {}
    // 4. Hapus dari list lokal
    allUsers = allUsers.filter(u => u.uid !== uid);
    const row = document.getElementById('row-' + uid);
    if (row) { row.style.opacity = '0'; row.style.transition = 'opacity .3s'; setTimeout(() => row.remove(), 300); }
    updateStats();
    document.getElementById('user-count').textContent = allUsers.length + ' user';
    closeConfirm();
    toastAdm('✅ Akun ' + username + ' berhasil dihapus dari Firestore');

    // Catatan: hapus dari Firebase Auth memerlukan Admin SDK (server-side)
    // Di client-side, data Firestore sudah bersih — akun Auth akan tidak bisa login karena data hilang
  } catch(e) {
    toastAdm('❌ Gagal hapus: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '🗑️ Hapus';
}

// Close confirm overlay jika klik di luar
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
</script>
</body>
</html>
