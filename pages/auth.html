<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduFun — Masuk / Daftar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --ac: #3b82f6;
  --ac-rgb: 59,130,246;
  --ac-l: rgba(59,130,246,.10);
  --ac-m: rgba(59,130,246,.30);
  --ac-g: 0 0 0 3px rgba(59,130,246,.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
}

.auth-wrap { width: 100%; max-width: 420px; padding: 1.5rem; }

.auth-box {
  background: #fff;
  border: 2px solid #e2e8f0;
  border-radius: 22px;
  padding: 2.25rem 2rem;
  box-shadow: 0 8px 40px rgba(0,0,0,.08);
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Logo */
.auth-logo { text-align: center; margin-bottom: 1.5rem; }
.auth-logo-box {
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--ac); display: flex; align-items: center;
  justify-content: center; margin: 0 auto .65rem;
  box-shadow: 0 4px 18px rgba(59,130,246,.35);
}
.auth-logo-box svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 2.5; fill: none; }
.auth-logo-title { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 700; color: var(--ac); }
.auth-logo-sub   { font-size: .82rem; color: #64748b; margin-top: .15rem; }

/* Tabs */
.auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.5rem; }
.auth-tab {
  padding: .5rem; border: 2px solid #e2e8f0; border-radius: 10px;
  background: #fff; color: #64748b; font-weight: 700; font-size: .88rem;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.auth-tab.sel { border-color: var(--ac); color: var(--ac); background: var(--ac-l); }

.form-section { display: none; }
.form-section.on { display: block; }

/* Form */
.f-label  { font-size: .78rem; font-weight: 700; color: #64748b; display: block; margin-bottom: .3rem; }
.f-group  { margin-bottom: .85rem; }
.f-hint   { font-size: .72rem; color: #94a3b8; margin-top: .25rem; }
.role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: .85rem; }

.inp {
  width: 100%; padding: .55rem .9rem; border: 2px solid #e2e8f0;
  border-radius: 10px; font-family: inherit; font-size: .9rem;
  outline: none; transition: border-color .2s; background: #fff; color: #0f172a;
}
.inp:focus { border-color: var(--ac); box-shadow: var(--ac-g); }

.bp {
  background: var(--ac); color: #fff; border: none; border-radius: 10px;
  padding: .55rem 1.2rem; font-weight: 700; font-size: .88rem;
  cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s; width: 100%;
}
.bp:hover  { opacity: .88; }
.bp:active { transform: scale(.98); }
.bp:disabled { opacity: .55; cursor: not-allowed; }

.bg {
  background: transparent; border: 2px solid #e2e8f0; border-radius: 10px;
  padding: .42rem .9rem; font-weight: 600; font-size: .83rem;
  cursor: pointer; color: #64748b; font-family: inherit; transition: all .15s;
}
.bg:hover  { border-color: var(--ac); color: var(--ac); }
.bg.sel    { border-color: var(--ac); color: var(--ac); background: var(--ac-l); }

/* Messages */
.auth-err {
  background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 10px;
  padding: .55rem .85rem; font-size: .8rem; font-weight: 700; color: #ef4444;
  margin-bottom: .85rem; display: none;
}
.auth-err.on { display: block; }
.auth-ok {
  background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px;
  padding: .55rem .85rem; font-size: .8rem; font-weight: 700; color: #16a34a;
  margin-bottom: .85rem; display: none;
}
.auth-ok.on { display: block; }

.auth-footer { text-align: center; font-size: .76rem; color: #94a3b8; margin-top: .9rem; line-height: 1.6; }
.auth-footer a { color: var(--ac); font-weight: 700; cursor: pointer; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }

/* Password toggle */
.pw-wrap  { position: relative; }
.pw-eye   {
  position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: #94a3b8; background: none; border: none; padding: 0;
  display: flex; align-items: center;
}
.pw-eye:hover { color: var(--ac); }
.inp-pw { padding-right: 2.5rem !important; }

/* Remember me */
.remember-row {
  display: flex; align-items: center; gap: .5rem;
  margin-bottom: .85rem;
}
.remember-row input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--ac); cursor: pointer;
}
.remember-row label { font-size: .8rem; font-weight: 600; color: #64748b; cursor: pointer; }

/* Divider */
.auth-divider {
  text-align: center; font-size: .72rem; color: #94a3b8;
  margin: .5rem 0; position: relative;
}
.auth-divider::before, .auth-divider::after {
  content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: #e2e8f0;
}
.auth-divider::before { left: 0; }
.auth-divider::after  { right: 0; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-box">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="auth-logo-title">EduFun</div>
      <div class="auth-logo-sub">Platform Belajar Interaktif</div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab sel" id="tab-login"    onclick="switchTab('login')">🔑 Masuk</button>
      <button class="auth-tab"     id="tab-register" onclick="switchTab('register')">✨ Daftar</button>
    </div>

    <!-- ========== LOGIN FORM ========== -->
    <div class="form-section on" id="form-login">
      <div id="login-err" class="auth-err"></div>

      <div class="f-group">
        <label class="f-label" for="login-username">Username</label>
        <input class="inp" id="login-username" placeholder="Masukkan username kamu" autocomplete="username"/>
      </div>

      <div class="f-group">
        <label class="f-label" for="login-password">Password</label>
        <div class="pw-wrap">
          <input class="inp inp-pw" type="password" id="login-password"
                 placeholder="Masukkan password" autocomplete="current-password"/>
          <button class="pw-eye" onclick="togglePw('login-password', this)" type="button" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember-me"/>
        <label for="remember-me">Ingat saya selama 7 hari</label>
      </div>

      <button class="bp" id="btn-login" onclick="doLogin()">Masuk →</button>

      <div class="auth-footer">
        Belum punya akun? <a onclick="switchTab('register')">Daftar Gratis</a>
      </div>
    </div>

    <!-- ========== REGISTER FORM ========== -->
    <div class="form-section" id="form-register">
      <div id="register-err" class="auth-err"></div>
      <div id="register-ok"  class="auth-ok"></div>

      <div class="f-group">
        <label class="f-label">Kamu adalah</label>
        <div class="role-tabs" id="reg-role-tabs">
          <button class="bg sel" onclick="setRegRole('siswa', this)">🎒 Siswa</button>
          <button class="bg"     onclick="setRegRole('guru',  this)">📚 Guru</button>
        </div>
      </div>

      <div class="f-group">
        <label class="f-label" for="reg-username">Username</label>
        <input class="inp" id="reg-username" placeholder="Buat username unikmu" autocomplete="username"/>
        <div class="f-hint">Minimal 3 karakter. Huruf, angka, titik, atau underscore.</div>
      </div>

      <div class="f-group">
        <label class="f-label" for="reg-password">Password</label>
        <div class="pw-wrap">
          <input class="inp inp-pw" type="password" id="reg-password"
                 placeholder="Buat password" autocomplete="new-password"/>
          <button class="pw-eye" onclick="togglePw('reg-password', this)" type="button" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="f-hint">Minimal 4 karakter.</div>
      </div>

      <div class="f-group">
        <label class="f-label" for="reg-password2">Konfirmasi Password</label>
        <div class="pw-wrap">
          <input class="inp inp-pw" type="password" id="reg-password2"
                 placeholder="Ulangi password" autocomplete="new-password"/>
          <button class="pw-eye" onclick="togglePw('reg-password2', this)" type="button" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="bp" id="btn-register" onclick="doRegister()">Buat Akun →</button>

      <div class="auth-footer">
        Sudah punya akun? <a onclick="switchTab('login')">Masuk di sini</a><br/>
        <span style="margin-top:.4rem;display:inline-block">
          Dengan mendaftar, kamu setuju dengan Syarat &amp; Ketentuan EduFun
        </span>
      </div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- EduFun Firebase -->
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  let regRole = 'siswa';

  // Kalau sudah login, langsung ke app
  if (Auth.getSession()) window.location.href = 'app.html';

  // Cek URL param ?tab=register
  const urlTab = new URLSearchParams(location.search).get('tab');
  if (urlTab === 'register') switchTab('register');

  // ---- Tab switch ----
  function switchTab(tab) {
    document.getElementById('form-login').classList.toggle('on',    tab === 'login');
    document.getElementById('form-register').classList.toggle('on', tab === 'register');
    document.getElementById('tab-login').classList.toggle('sel',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('sel', tab === 'register');
    clearMessages();
  }

  function setRegRole(role, el) {
    regRole = role;
    document.querySelectorAll('#reg-role-tabs button').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel');
  }

  function clearMessages() {
    ['login-err', 'register-err', 'register-ok'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('on');
      el.textContent = '';
    });
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '⚠️ ' + msg;
    el.classList.add('on');
    el.style.animation = 'none';
    requestAnimationFrame(() => { el.style.animation = ''; });
  }

  function showOk(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '✅ ' + msg;
    el.classList.add('on');
  }

  function togglePw(inputId, btn) {
    const inp   = document.getElementById(inputId);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
           <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>
         </svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
           <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
           <line x1="1" y1="1" x2="23" y2="23"/>
         </svg>`;
  }

  // ---- Login ----
  async function doLogin() {
    clearMessages();
    const username   = document.getElementById('login-username').value;
    const password   = document.getElementById('login-password').value;
    const rememberMe = document.getElementById('remember-me').checked;
    const btn        = document.getElementById('btn-login');

    if (!username.trim()) { showErr('login-err', 'Username tidak boleh kosong.'); return; }
    if (!password)         { showErr('login-err', 'Password tidak boleh kosong.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Masuk...';

    const result = await Auth.login(username, password, rememberMe);
    if (result.ok) {
      btn.textContent = '✓ Berhasil!';
      setTimeout(() => { window.location.href = 'app.html'; }, 600);
    } else {
      showErr('login-err', result.msg);
      btn.disabled    = false;
      btn.textContent = 'Masuk →';
    }
  }

  // ---- Register ----
  async function doRegister() {
    clearMessages();
    const username  = document.getElementById('reg-username').value;
    const password  = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;
    const btn       = document.getElementById('btn-register');

    if (password !== password2) {
      showErr('register-err', 'Password dan konfirmasi password tidak sama.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Membuat akun...';

    const result = await Auth.register(username, password, regRole);
    if (result.ok) {
      showOk('register-ok', result.msg + ' Silakan masuk.');
      btn.textContent = 'Buat Akun →';
      btn.disabled    = false;
      // Auto login setelah register
      await Auth.login(username, password, false);
      setTimeout(() => { window.location.href = 'app.html'; }, 1200);
    } else {
      showErr('register-err', result.msg);
      btn.disabled    = false;
      btn.textContent = 'Buat Akun →';
    }
  }

  // ---- Enter key ----
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginOn = document.getElementById('form-login').classList.contains('on');
    if (loginOn) doLogin(); else doRegister();
  });
</script>
</body>
</html>
